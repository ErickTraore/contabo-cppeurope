version: "3.9"
services:
  mediaGle-backend:
    image: node:18-alpine
    working_dir: /usr/src/app
    command: sh -c "npm install --only=production && node server.prod.js"
    env_file: .env.production
    environment:
      NODE_ENV: production
    volumes:
      - ./:/usr/src/app
      - ./uploads:/usr/src/app/uploads
    restart: unless-stopped
    depends_on:
      - mariadb

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: media_prod_cppeurope_v1
      MARIADB_USER: c
      MARIADB_PASSWORD: CppEurope@2025!
      MARIADB_ROOT_PASSWORD: RootPass@2025!
    volumes:
      - media-db-data:/var/lib/mysql

volumes:
  media-db-data:
    name: media-backend_media-db-data
