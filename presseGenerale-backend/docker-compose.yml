# Presse générale CPPEurope — aligné sur Hostinger (API en mémoire, port 7016 sur loopback)
services:
  presse-generale-backend:
    image: node:20-alpine
    working_dir: /usr/src/app
    command: sh -c "npm install --omit=dev && node server.prod.js"
    ports:
      - "0.0.0.0:7016:7016"
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: "7016"
      ALLOWED_ORIGINS: "https://cppeurope.net,https://www.cppeurope.net,http://localhost:8082"
    volumes:
      - ./:/usr/src/app
    restart: unless-stopped
