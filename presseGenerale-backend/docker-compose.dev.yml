services:
  presseGenerale-backend:
    command: sh -c "npm install && NODE_ENV=development node server.dev.js"
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
    depends_on:
      mariadb:
        condition: service_healthy

  presseLocale-backend:
    command: sh -c "npm install && NODE_ENV=development node server.dev.js"
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    environment:
      # Aligné sur .env.development (DB_NAME=presse_generale_dev_cppeurope_v1).
      MARIADB_DATABASE: presse_generale_dev_cppeurope_v1
      MARIADB_USER: c
      MARIADB_PASSWORD: CppEurope@2025!
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 25s
    ports:
      - "3311:3306"
