services:
  home-config-backend:
    image: node:20-alpine
    working_dir: /usr/src/app
    command: sh -c "npm install --omit=dev && node server.prod.js"
    ports:
      # Hostinger nginx → http://62.171.186.233:7020 (pas 127.0.0.1 seul)
      - "0.0.0.0:7020:7020"
    env_file: .env.production
    environment:
      NODE_ENV: production
    volumes:
      - ./:/usr/src/app
      - ./uploads/home:/usr/src/app/uploads/home
    restart: unless-stopped
    depends_on:
      - mariadb
    networks:
      - home-config-net

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: home_config_prod_cppeurope_v1
      MARIADB_USER: c
      MARIADB_PASSWORD: CppEurope@2025!
      MARIADB_ROOT_PASSWORD: RootPass@2025!
    volumes:
      - home-config-prod-db:/var/lib/mysql
    networks:
      home-config-net:
        aliases:
          - mariadb

volumes:
  home-config-prod-db:

networks:
  home-config-net:
    name: home-config-net
